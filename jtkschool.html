<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ja Ta Ki | Gestão Escolar Inteligente</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #06b6d4;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-alt: #fafbff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
      --shadow: 0 4px 12px rgba(15,23,42,0.06);
      --shadow-lg: 0 12px 32px rgba(15,23,42,0.08);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-alt: #273449;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.4);
    }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    .layout { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .brand-logo {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.3rem;
      box-shadow: 0 6px 16px rgba(99,102,241,0.35);
    }
    .brand-text h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px; }
    .brand-text span { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-section {
      font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 0.75rem 0.75rem 0.5rem;
      margin-top: 0.5rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.7rem 0.85rem;
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: var(--transition);
      margin-bottom: 0.2rem;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .nav-item i { width: 20px; text-align: center; font-size: 1rem; }
    .nav-item:hover { background: var(--surface-alt); color: var(--text); }
    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 6px 14px rgba(99,102,241,0.3);
    }
    .nav-item.active i { color: white; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: white;
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-weight: 700;
    }
    .nav-item.active .nav-badge { background: rgba(255,255,255,0.25); }

    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: var(--shadow-sm);
    }
    .page-title h2 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.5px; }
    .page-title p { font-size: 0.8rem; color: var(--text-muted); }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    .search-box { position: relative; display: flex; align-items: center; }
    .search-box i { position: absolute; left: 12px; color: var(--text-muted); font-size: 0.85rem; }
    .search-box input {
      padding: 0.55rem 0.9rem 0.55rem 2.2rem;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--surface-alt);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      width: 240px;
      transition: var(--transition);
    }
    .search-box input:focus { outline: none; border-color: var(--primary); width: 280px; }
    .kbd-hint {
      position: absolute;
      right: 10px;
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-weight: 600;
      pointer-events: none;
    }
    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      position: relative;
      transition: var(--transition);
    }
    .icon-btn:hover { background: var(--primary); color: white; border-color: transparent; }
    .icon-btn .dot {
      position: absolute; top: 8px; right: 8px;
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .content { padding: 1.75rem 2rem 3rem; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      animation: slideUp 0.4s ease backwards;
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 100px; height: 100px;
      background: var(--stat-color, var(--primary));
      opacity: 0.08;
      border-radius: 50%;
      transform: translate(30%, -30%);
      transition: var(--transition);
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .stat-card:hover::before { transform: translate(20%, -20%) scale(1.2); }
    .stat-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius);
      background: var(--stat-color, var(--primary));
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }
    .stat-info { flex: 1; min-width: 0; }
    .stat-info small { color: var(--text-muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-info h3 { font-size: 1.75rem; font-weight: 800; letter-spacing: -1px; }
    .stat-info .trend { font-size: 0.75rem; font-weight: 600; margin-top: 2px; display: flex; align-items: center; gap: 0.3rem; }
    .trend.up { color: var(--success); }
    .trend.down { color: var(--danger); }
    .trend.neutral { color: var(--text-muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.25rem;
      animation: slideUp 0.4s ease backwards;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .card-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .card-header small { color: var(--text-muted); font-size: 0.75rem; }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.75rem;
    }
    .quick-action {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      animation: slideUp 0.4s ease backwards;
    }
    .quick-action:nth-child(1) { animation-delay: 0.05s; }
    .quick-action:nth-child(2) { animation-delay: 0.1s; }
    .quick-action:nth-child(3) { animation-delay: 0.15s; }
    .quick-action:nth-child(4) { animation-delay: 0.2s; }
    .quick-action:nth-child(5) { animation-delay: 0.25s; }
    .quick-action:nth-child(6) { animation-delay: 0.3s; }
    .quick-action:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .quick-action-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      color: white;
    }
    .quick-action strong { font-size: 0.85rem; font-weight: 700; }
    .quick-action small { font-size: 0.72rem; color: var(--text-muted); }

    .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      height: 200px;
      padding: 0.5rem 0;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      max-width: 40px;
      background: linear-gradient(180deg, var(--primary-light), var(--primary));
      border-radius: 6px 6px 0 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 4px;
      cursor: pointer;
    }
    .bar:hover { opacity: 0.85; transform: scaleY(1.02); }
    .bar-value { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); }
    .bar-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }

    .donut-chart { display: flex; align-items: center; gap: 1.5rem; padding: 0.5rem; }
    .donut-svg { width: 140px; height: 140px; flex-shrink: 0; }
    .donut-legend { flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; font-size: 0.85rem; }
    .legend-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-item strong { margin-left: auto; font-size: 0.85rem; }

    .activity-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .activity-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.65rem 0.5rem;
      border-radius: var(--radius);
      transition: var(--transition);
    }
    .activity-item:hover { background: var(--surface-alt); }
    .activity-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .activity-info { flex: 1; min-width: 0; }
    .activity-info strong { display: block; font-size: 0.85rem; font-weight: 600; }
    .activity-info small { color: var(--text-muted); font-size: 0.75rem; }
    .activity-time { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }

    .toolbar {
      display: flex; flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }
    .btn {
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius);
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: inline-flex; align-items: center; gap: 0.5rem;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn:hover { background: var(--surface-alt); transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(99,102,241,0.25); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: white; border-color: transparent; }
    .btn-danger { background: var(--danger); color: white; border-color: transparent; }
    .btn-warning { background: var(--warning); color: white; border-color: transparent; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
    .btn-icon { padding: 0.5rem; width: 36px; height: 36px; justify-content: center; }
    .filter-chip {
      padding: 0.45rem 0.9rem;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active { background: var(--primary); color: white; border-color: transparent; }
    .view-toggle {
      display: inline-flex;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.2rem;
    }
    .view-toggle button {
      background: transparent;
      border: none;
      padding: 0.4rem 0.7rem;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .view-toggle button.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); }

    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th {
      text-align: left;
      padding: 0.9rem 1.1rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface-alt);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--primary); }
    th .sort-icon { margin-left: 0.3rem; font-size: 0.65rem; opacity: 0.5; }
    td { padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-alt); }
    .avatar-cell { display: flex; align-items: center; gap: 0.75rem; }
    .avatar-sm {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 0.8rem;
      flex-shrink: 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-success { background: rgba(16,185,129,0.12); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-info { background: rgba(6,182,212,0.12); color: var(--info); }
    .badge-primary { background: rgba(99,102,241,0.12); color: var(--primary); }
    .badge-purple { background: rgba(139,92,246,0.12); color: var(--purple); }
    .badge-pink { background: rgba(236,72,153,0.12); color: var(--pink); }
    .badge i { font-size: 0.65rem; }
    .row-actions { display: flex; gap: 0.4rem; }
    .row-actions button {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .row-actions button:hover { background: var(--primary); color: white; border-color: transparent; }
    .row-actions button.danger:hover { background: var(--danger); }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      border-top: 1px solid var(--border);
      background: var(--surface-alt);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .pagination-info { font-size: 0.8rem; color: var(--text-muted); }
    .pagination-controls { display: flex; gap: 0.3rem; }
    .pagination-controls button {
      min-width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: var(--transition);
      font-family: inherit;
    }
    .pagination-controls button:hover:not(:disabled) { background: var(--primary); color: white; border-color: transparent; }
    .pagination-controls button.active { background: var(--primary); color: white; border-color: transparent; }
    .pagination-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      transition: var(--transition);
      cursor: pointer;
      animation: slideUp 0.4s ease backwards;
    }
    .person-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .person-card-header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1rem; }
    .person-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .person-info h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.15rem; }
    .person-info small { color: var(--text-muted); font-size: 0.75rem; }
    .person-card-body { display: flex; flex-direction: column; gap: 0.5rem; }
    .person-card-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; }
    .person-card-row span { color: var(--text-muted); }
    .person-card-footer { display: flex; gap: 0.4rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }

    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      z-index: 100;
      padding: 1rem;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 720px; width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.75rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      animation: modalIn 0.3s ease;
    }
    .modal-content::-webkit-scrollbar { width: 6px; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .modal-header h3 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface-alt);
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .modal-close:hover { background: var(--danger); color: white; }
    .form-section { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px dashed var(--border); }
    .form-section:last-of-type { border-bottom: none; }
    .form-section-title {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem; font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-section-title i { font-size: 0.9rem; }
    .form-group { margin-bottom: 0.85rem; }
    .form-group label {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 600;
      margin-bottom: 0.35rem;
      color: var(--text-muted);
    }
    .form-group label i { font-size: 0.75rem; color: var(--primary); }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      transition: var(--transition);
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; }
    .form-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.85rem; }
    .modal-footer {
      display: flex; gap: 0.6rem; justify-content: flex-end;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .info-chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      background: var(--surface-alt);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .detail-item { padding: 0.75rem; background: var(--surface-alt); border-radius: var(--radius); }
    .detail-item small {
      display: flex; align-items: center; gap: 0.35rem;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }
    .detail-item small i { color: var(--primary); }
    .detail-item strong { font-size: 0.9rem; font-weight: 600; display: block; }

    .sub-tabs {
      display: flex;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
      overflow-x: auto;
    }
    .sub-tab {
      padding: 0.6rem 1rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; gap: 0.4rem;
      white-space: nowrap;
      font-family: inherit;
    }
    .sub-tab:hover { color: var(--primary); }
    .sub-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .sub-pane { display: none; animation: fadeIn 0.3s; }
    .sub-pane.active { display: block; }

    .course-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
      transition: var(--transition);
    }
    .course-card:hover { box-shadow: var(--shadow-lg); }
    .course-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .course-header:hover { background: var(--surface-alt); }
    .course-icon {
      width: 48px; height: 48px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .course-info { flex: 1; }
    .course-info h3 { font-size: 1.05rem; font-weight: 700; }
    .course-info small { color: var(--text-muted); font-size: 0.78rem; }
    .course-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.35rem; }
    .course-toggle {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface-alt);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .course-card.expanded .course-toggle { transform: rotate(180deg); color: var(--primary); }
    .course-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; border-top: 1px solid var(--border); }
    .course-card.expanded .course-body { max-height: 2000px; }
    .course-body-inner { padding: 1.25rem; }
    .level-item { background: var(--surface-alt); border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 0.6rem; }
    .level-header { display: flex; align-items: center; gap: 0.7rem; cursor: pointer; font-weight: 700; font-size: 0.9rem; }
    .level-header .chevron { transition: transform 0.2s; color: var(--text-muted); }
    .level-item.expanded .level-header .chevron { transform: rotate(90deg); color: var(--primary); }
    .level-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
    .level-item.expanded .level-content { max-height: 1500px; }
    .topic-item {
      margin: 0.5rem 0 0.5rem 1.5rem;
      padding: 0.6rem 0.85rem;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--primary);
    }
    .topic-header { display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.35rem; }
    .subject-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem; }
    .subject-chip {
      padding: 0.2rem 0.6rem;
      background: var(--surface-alt);
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .subject-chip i { font-size: 0.6rem; color: var(--primary); }
    .add-btn-inline {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.35rem;
      transition: var(--transition);
      font-family: inherit;
    }
    .add-btn-inline:hover { border-color: var(--primary); color: var(--primary); }

    .progress-bar { height: 8px; background: var(--surface-alt); border-radius: 10px; overflow: hidden; margin-top: 0.3rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 10px; transition: width 0.6s ease; }

    .mini-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.3rem; }
    .cal-header { text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); padding: 0.4rem 0; text-transform: uppercase; }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .cal-day:hover { background: var(--surface-alt); }
    .cal-day.today { background: var(--primary); color: white; }
    .cal-day.has-event::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }
    .cal-day.other-month { color: var(--text-muted); opacity: 0.4; }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 0.6rem; pointer-events: none; }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 280px;
      max-width: 400px;
      animation: toastIn 0.3s ease;
      pointer-events: auto;
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }
    .toast.info { border-left-color: var(--info); }
    .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; background: var(--primary); }
    .toast.success .toast-icon { background: var(--success); }
    .toast.error .toast-icon { background: var(--danger); }
    .toast.warning .toast-icon { background: var(--warning); }
    .toast.info .toast-icon { background: var(--info); }
    .toast-content { flex: 1; }
    .toast-content strong { display: block; font-size: 0.85rem; font-weight: 700; }
    .toast-content small { color: var(--text-muted); font-size: 0.78rem; }
    .toast-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0.2rem; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

    .receipt { background: white; color: #1e293b; padding: 2rem; max-width: 500px; margin: 0 auto; font-family: 'Courier New', monospace; }
    .receipt-header { text-align: center; border-bottom: 2px dashed #1e293b; padding-bottom: 1rem; margin-bottom: 1rem; }
    .receipt-header h2 { font-size: 1.3rem; font-weight: 800; }
    .receipt-header p { font-size: 0.8rem; color: #64748b; }
    .receipt-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; }
    .receipt-total { border-top: 2px dashed #1e293b; margin-top: 1rem; padding-top: 1rem; font-size: 1.1rem; font-weight: 700; }
    .receipt-footer { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; border-top: 2px dashed #1e293b; padding-top: 1rem; }

    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text-muted); }
    .empty-state-icon {
      width: 80px; height: 80px;
      border-radius: 20px;
      background: var(--surface-alt);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    .empty-state h3 { color: var(--text); margin-bottom: 0.5rem; font-size: 1.1rem; }
    .empty-state p { max-width: 400px; margin: 0 auto 1rem; font-size: 0.9rem; }

    /* ONBOARDING - Estado inicial vazio */
    .onboarding {
      background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(245,158,11,0.05));
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .onboarding-icon {
      width: 100px; height: 100px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
      margin-bottom: 1.25rem;
      box-shadow: 0 12px 30px rgba(99,102,241,0.3);
    }
    .onboarding h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
    .onboarding p { color: var(--text-muted); max-width: 500px; margin: 0 auto 1.5rem; }
    .onboarding-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
      text-align: left;
    }
    .onboarding-step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      cursor: pointer;
      transition: var(--transition);
    }
    .onboarding-step:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .onboarding-step-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      font-size: 0.85rem;
    }
    .onboarding-step strong { display: block; font-size: 0.9rem; margin-bottom: 0.15rem; }
    .onboarding-step small { color: var(--text-muted); font-size: 0.75rem; }

    /* NOTAS - Sistema de Avaliações */
    .nota-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-weight: 800;
      font-size: 0.85rem;
    }
    .nota-excelente { background: rgba(16,185,129,0.15); color: var(--success); }
    .nota-bom { background: rgba(6,182,212,0.15); color: var(--info); }
    .nota-medio { background: rgba(245,158,11,0.15); color: var(--warning); }
    .nota-fraco { background: rgba(239,68,68,0.15); color: var(--danger); }
    .nota-nulo { background: var(--surface-alt); color: var(--text-muted); }

    .grade-circle {
      width: 90px; height: 90px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .grade-circle strong { font-size: 1.6rem; line-height: 1; }
    .grade-circle small { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }

    .nota-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: var(--transition);
      margin-bottom: 0.6rem;
    }
    .nota-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .nota-type-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .nota-info { flex: 1; min-width: 0; }
    .nota-info strong { display: block; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.15rem; }
    .nota-info small { color: var(--text-muted); font-size: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* COMMAND PALETTE */
    .command-palette {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(8px);
      align-items: flex-start;
      justify-content: center;
      z-index: 150;
      padding: 10vh 1rem 1rem;
    }
    .command-palette.active { display: flex; }
    .command-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 600px; width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: modalIn 0.2s ease;
    }
    .command-input {
      width: 100%;
      padding: 1rem 1.25rem 1rem 3rem;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      border-bottom: 1px solid var(--border);
    }
    .command-input:focus { outline: none; box-shadow: none; }
    .command-search-icon { position: absolute; left: 1.25rem; top: 1.15rem; color: var(--text-muted); font-size: 1rem; }
    .command-results { max-height: 400px; overflow-y: auto; padding: 0.5rem; }
    .command-result {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
    }
    .command-result:hover, .command-result.selected { background: var(--surface-alt); }
    .command-result i { width: 20px; color: var(--primary); text-align: center; }
    .command-result strong { font-size: 0.88rem; font-weight: 600; }
    .command-result small { color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }
    .command-section {
      padding: 0.5rem 0.85rem 0.25rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 1024px) {
      .dash-grid, .dash-grid-3 { grid-template-columns: 1fr; }
      .form-row-3, .form-row-4 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: -270px; width: 270px; z-index: 60; transition: left var(--transition); }
      .sidebar.open { left: 0; }
      .topbar { padding: 0.85rem 1rem; }
      .content { padding: 1.25rem 1rem; }
      .search-box input { width: 140px; }
      .search-box input:focus { width: 160px; }
      .mobile-toggle { display: flex !important; }
      .form-row, .form-row-3, .form-row-4 { grid-template-columns: 1fr; }
      .kbd-hint { display: none; }
    }
    .mobile-toggle { display: none; }

    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo"><i class="fas fa-graduation-cap"></i></div>
        <div class="brand-text">
          <h1>Ja Ta Ki</h1>
          <span>Gestão Escolar</span>
        </div>
      </div>

      <div class="nav-section">Principal</div>
      <button class="nav-item active" data-tab="dashboard">
        <i class="fas fa-gauge-high"></i> Dashboard
      </button>
      <button class="nav-item" data-tab="alunos">
        <i class="fas fa-user-graduate"></i> Alunos
        <span class="nav-badge" id="badgeAlunos">0</span>
      </button>
      <button class="nav-item" data-tab="professores">
        <i class="fas fa-chalkboard-user"></i> Professores
      </button>
      <button class="nav-item" data-tab="cursos">
        <i class="fas fa-book-open-reader"></i> Cursos
      </button>
      <button class="nav-item" data-tab="notas">
        <i class="fas fa-clipboard-list"></i> Notas
        <span class="nav-badge" id="badgeNotas" style="background:var(--success)">0</span>
      </button>
      <button class="nav-item" data-tab="presenca">
        <i class="fas fa-clipboard-check"></i> Presença
      </button>

      <div class="nav-section">Financeiro</div>
      <button class="nav-item" data-tab="pagamentos">
        <i class="fas fa-wallet"></i> Pagamentos
      </button>
      <button class="nav-item" data-tab="relatorios">
        <i class="fas fa-chart-pie"></i> Relatórios
      </button>

      <div class="nav-section">Sistema</div>
      <button class="nav-item" data-tab="calendario">
        <i class="fas fa-calendar-days"></i> Calendário
      </button>
      <button class="nav-item" data-tab="config">
        <i class="fas fa-gear"></i> Configurações
      </button>
    </aside>

    <div class="main">
      <div class="topbar">
        <button class="icon-btn mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
        <div class="page-title">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Visão geral da sua escola</p>
        </div>
        <div class="topbar-actions">
          <div class="search-box">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" placeholder="Buscar..." id="globalSearch">
            <span class="kbd-hint">Ctrl+K</span>
          </div>
          <button class="icon-btn" title="Notificações" onclick="showToast('info','Notificações','Você tem novas notificações')">
            <i class="fas fa-bell"></i>
          </button>
          <button class="icon-btn" id="themeToggle" title="Alternar tema">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>

      <div class="content" id="content"></div>
    </div>
  </div>

  <div id="modalContainer" class="modal"></div>
  <div id="commandPalette" class="command-palette">
    <div class="command-box">
      <div style="position:relative">
        <i class="fas fa-magnifying-glass command-search-icon"></i>
        <input type="text" class="command-input" id="commandInput" placeholder="Buscar alunos, cursos, ações..." autocomplete="off">
      </div>
      <div class="command-results" id="commandResults"></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      // ===== STATE INICIAL VAZIO =====
      const emptyState = {
        alunos: [],
        professores: [],
        cursos: [],
        presencas: [],
        pagamentos: [],
        notas: [],
        logs: [],
        moedas: {
          AOA: { nome: 'Kwanza', simbolo: 'Kz', bandeira: '🇦🇴' },
          USD: { nome: 'Dólar', simbolo: '$', bandeira: '🇺🇸' },
          EUR: { nome: 'Euro', simbolo: '€', bandeira: '🇪🇺' },
          BRL: { nome: 'Real', simbolo: 'R$', bandeira: '🇧🇷' }
        }
      };

      let State = JSON.parse(localStorage.getItem('jataki_state')) || JSON.parse(JSON.stringify(emptyState));
      // Garantir campos novos em estados antigos
      if (!State.notas) State.notas = [];

      function statusBadge(status) {
        const map = { 'Ativo': ['success','fa-circle-check'], 'Pendente': ['warning','fa-clock'], 'Inativo': ['danger','fa-circle-xmark'], 'Suspenso': ['danger','fa-ban'], 'Presente': ['success','fa-circle-check'], 'Ausente': ['danger','fa-circle-xmark'], 'Justificado': ['warning','fa-circle-exclamation'], 'Pago': ['success','fa-circle-check'], 'Atrasado': ['danger','fa-circle-exclamation'], 'Aprovado': ['success','fa-circle-check'], 'Reprovado': ['danger','fa-circle-xmark'], 'Recuperação': ['warning','fa-rotate'] };
        const [cls, icon] = map[status] || ['info','fa-circle-info'];

        return `<span class="badge" style="background:${t.cor}20;color:${t.cor}"><i class="fas ${t.icone}"></i> ${tipo}</span>`;
      }
      function formatMoeda(valor, moeda) {
        const m = State.moedas[moeda];
        if (!m) return valor;
        if (moeda === 'AOA') return `${m.simbolo} ${Number(valor).toLocaleString('pt-BR')}`;
        return `${m.simbolo} ${Number(valor).toFixed(2)}`;
      }
      function nextId(prefix, arr) {
        const nums = arr.map(i => parseInt(String(i.id).replace(prefix,''))).filter(n => !isNaN(n));
        const next = (nums.length ? Math.max(...nums) : 0) + 1;
        return prefix + String(next).padStart(3,'0');
      }
      function formatDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '-'; }
      function calcIdade(nascimento) {
        if (!nascimento) return '-';
        const hoje = new Date();
        const n = new Date(nascimento);
        let idade = hoje.getFullYear() - n.getFullYear();
        const m = hoje.getMonth() - n.getMonth();
        if (m < 0 || (m === 0 && hoje.getDate() < n.getDate())) idade--;
        return idade + ' anos';
      }
      function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

                        <strong>${p.alunoNome}</strong>
                        <small>${formatMoeda(p.valor, p.moeda)} • ${formatDate(p.vencimento)}</small>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
          </div>

          ${State.alunos.length > 0 ? `
            <div class="card">
              <div class="card-header">
                <div>
                  <h3><i class="fas fa-trophy" style="color:var(--accent)"></i> Top Alunos - Melhor Desempenho</h3>
                  <small>Baseado na média das notas</small>
                </div>
                <button class="btn btn-sm" onclick="switchTab('notas')"><i class="fas fa-arrow-right"></i> Ver todas</button>
              </div>
              ${renderTopAlunos()}
            </div>
          ` : ''}
        `;
      }

      function renderTopAlunos() {
        const alunosComNotas = State.alunos.map(a => {
          const notas = State.notas.filter(n => n.alunoId === a.id);
          if (notas.length === 0) return null;
          const media = notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length;
          return { aluno: a, media, total: notas.length };
        }).filter(x => x).sort((a,b) => b.media - a.media).slice(0,5);

        if (alunosComNotas.length === 0) {
          return `<div class="empty-state" style="padding:1.5rem"><small style="color:var(--text-muted)">Nenhuma nota registrada ainda</small></div>`;
        }

        return alunosComNotas.map((item, i) => `
          <div style="display:flex;align-items:center;gap:0.85rem;padding:0.6rem 0;border-bottom:1px solid var(--border)">
            <div style="width:28px;height:28px;border-radius:50%;background:${i<3?'var(--accent)':'var(--surface-alt)'};color:${i<3?'white':'var(--text-muted)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem">${i+1}</div>
            <div class="avatar-sm" style="background:${item.aluno.cor};width:36px;height:36px;font-size:0.8rem">${initials(item.aluno.nome)}</div>
            <div style="flex:1">
              <strong style="font-size:0.85rem;display:block">${item.aluno.nome}</strong>
              <div class="progress-bar"><div class="progress-fill" style="width:${item.media*5}%;background:${item.media>=14?'var(--success)':item.media>=10?'var(--warning)':'var(--danger)'}"></div></div>
            </div>
            <div style="text-align:right">
              <strong style="color:var(--primary);font-size:0.95rem">${item.media.toFixed(1)}</strong>
              <small style="display:block;color:var(--text-muted);font-size:0.7rem">${item.total} notas</small>
            </div>
          </div>
        `).join('');
      }

      function renderDonut(data, cores, total) {
        const size = 140;
        const radius = 55;
        const circumference = 2 * Math.PI * radius;
        let offset = 0;
        const segments = data.map(d => {
          const pct = d.valor / total;
          const len = pct * circumference;
          const seg = `<circle cx="70" cy="70" r="${radius}" fill="none" stroke="${cores[d.nome]}" stroke-width="20" stroke-dasharray="${len} ${circumference}" stroke-dashoffset="${-offset}" transform="rotate(-90 70 70)"/>`;
          offset += len;
          return seg;
        }).join('');

        return `
          <svg class="donut-svg" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="${radius}" fill="none" stroke="var(--border)" stroke-width="20"/>
            ${segments}
            <text x="70" y="68" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="800">${total}</text>
            <text x="70" y="84" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-weight="600">TOTAL</text>
          </svg>
          <div class="donut-legend">
            ${data.map(d => `
              <div class="legend-item">
                <span class="legend-color" style="background:${cores[d.nome]}"></span>
                <span>${d.nome}</span>
                <strong>${d.valor}</strong>
              </div>
            `).join('')}
          </div>
        `;
      }

      // ===== ALUNOS =====
      let alunosView = 'list';
      let alunosFilter = { situacao: '', categoria: '', plano: '', busca: '' };
      let alunosSort = { field: 'nome', dir: 'asc' };
      let alunosPage = 1;
      const alunosPerPage = 8;

      function getFilteredAlunos() {
        let list = [...State.alunos];
        if (alunosFilter.situacao) list = list.filter(a => a.situacao === alunosFilter.situacao);
        if (alunosFilter.categoria) list = list.filter(a => a.categoria === alunosFilter.categoria);
        if (alunosFilter.plano) list = list.filter(a => a.plano === alunosFilter.plano);
        if (alunosFilter.busca) {
          const b = alunosFilter.busca.toLowerCase();
          list = list.filter(a => (a.nome||'').toLowerCase().includes(b) || (a.apelido||'').toLowerCase().includes(b) || (a.id||'').toLowerCase().includes(b) || (a.contato||'').toLowerCase().includes(b));
        }
        list.sort((a,b) => {
          const va = a[alunosSort.field] || '';
          const vb = b[alunosSort.field] || '';
          const cmp = String(va).localeCompare(String(vb));
          return alunosSort.dir === 'asc' ? cmp : -cmp;
        });
        return list;
      }

      function renderAlunos() {
        const filtered = getFilteredAlunos();
        const totalPages = Math.ceil(filtered.length / alunosPerPage) || 1;
        if (alunosPage > totalPages) alunosPage = totalPages;
        const start = (alunosPage - 1) * alunosPerPage;
        const paginated = filtered.slice(start, start + alunosPerPage);

        if (State.alunos.length === 0) {
          return `
            <div class="toolbar">
              <button class="btn btn-primary" onclick="openAlunoModal()"><i class="fas fa-user-plus"></i> Cadastrar Primeiro Aluno</button>
              <button class="btn" onclick="importCSV()"><i class="fas fa-file-csv"></i> Importar CSV</button>
            </div>
            <div class="card">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-user-plus"></i></div>
                <h3>Comece cadastrando seu primeiro aluno</h3>
                <p>Adicione alunos manualmente ou importe vários de uma vez via arquivo CSV.</p>
                <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap">
                  <button class="btn btn-primary" onclick="openAlunoModal()"><i class="fas fa-user-plus"></i> Novo Aluno</button>
                  <button class="btn" onclick="importCSV()"><i class="fas fa-file-csv"></i> Importar CSV</button>
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="toolbar">
            <button class="btn btn-primary" onclick="openAlunoModal()"><i class="fas fa-user-plus"></i> Novo Aluno</button>
            <button class="btn" onclick="importCSV()"><i class="fas fa-file-csv"></i> Importar CSV</button>
            <button class="btn" onclick="exportAlunos()"><i class="fas fa-file-export"></i> Exportar</button>
            <div class="view-toggle">
              <button class="${alunosView==='list'?'active':''}" onclick="setAlunosView('list')"><i class="fas fa-list"></i></button>
              <button class="${alunosView==='cards'?'active':''}" onclick="setAlunosView('cards')"><i class="fas fa-grip"></i></button>
            </div>
            <div style="margin-left:auto;display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center">
              <input type="text" placeholder="Buscar aluno..." value="${alunosFilter.busca}" oninput="alunosFilter.busca=this.value;alunosPage=1;rerender()" style="padding:0.4rem 0.8rem;border-radius:30px;width:180px;font-size:0.8rem">
              <select onchange="alunosFilter.situacao=this.value;alunosPage=1;rerender()" style="padding:0.4rem 0.7rem;border-radius:30px;font-size:0.8rem;width:auto">
                <option value="">Todas situações</option>
                ${SITUACOES.map(s => `<option ${alunosFilter.situacao===s?'selected':''}>${s}</option>`).join('')}
              </select>
              <select onchange="alunosFilter.categoria=this.value;alunosPage=1;rerender()" style="padding:0.4rem 0.7rem;border-radius:30px;font-size:0.8rem;width:auto">
                <option value="">Todas categorias</option>
                ${CATEGORIAS.map(c => `<option ${alunosFilter.categoria===c?'selected':''}>${c}</option>`).join('')}
              </select>
            </div>
          </div>

          ${filtered.length === 0 ? `
            <div class="card">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-filter-circle-xmark"></i></div>
                <h3>Nenhum aluno encontrado</h3>
                <p>Tente ajustar os filtros.</p>
              </div>
            </div>
          ` : alunosView === 'list' ? `
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th onclick="sortAlunos('id')"><i class="fas fa-fingerprint"></i> ID ${sortIcon('id')}</th>
                    <th onclick="sortAlunos('nome')"><i class="fas fa-user"></i> Nome ${sortIcon('nome')}</th>
                    <th onclick="sortAlunos('categoria')"><i class="fas fa-cake-candles"></i> Categoria ${sortIcon('categoria')}</th>
                    <th onclick="sortAlunos('plano')"><i class="fas fa-crown"></i> Plano ${sortIcon('plano')}</th>
                    <th><i class="fas fa-star"></i> Média</th>
                    <th><i class="fas fa-signal"></i> Situação</th>
                    <th style="text-align:right">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  ${paginated.map(a => {
                    const notas = State.notas.filter(n => n.alunoId === a.id);
                    const media = notas.length > 0 ? (notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length).toFixed(1) : '-';
                    const mediaClass = media !== '-' ? notaClass(parseFloat(media), 20) : 'nulo';
                    return `
                      <tr>
                        <td><span class="info-chip"><i class="fas fa-hashtag"></i> ${a.id}</span></td>
                        <td>
                          <div class="avatar-cell">
                            <div class="avatar-sm" style="background:${a.cor}">${initials(a.nome)}</div>
                            <div>
                              <strong style="display:block">${a.nome}</strong>
                              <small style="color:var(--text-muted)">${a.apelido || '-'}</small>
                            </div>
                          </div>
                        </td>
                        <td>${categoriaBadge(a.categoria)}</td>
                        <td>${planoBadge(a.plano)}</td>
                        <td><span class="nota-display nota-${mediaClass}">${media}</span></td>
                        <td>${statusBadge(a.situacao)}</td>
                        <td>
                          <div class="row-actions" style="justify-content:flex-end">
                            <button title="Ver" onclick="viewAluno('${a.id}')"><i class="fas fa-eye"></i></button>
                            <button title="Editar" onclick="openAlunoModal('${a.id}')"><i class="fas fa-pen"></i></button>
                            <button title="Excluir" class="danger" onclick="deleteAluno('${a.id}')"><i class="fas fa-trash"></i></button>
                          </div>
                        </td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
              ${renderPagination(filtered.length, alunosPage, totalPages, 'alunosPage')}
            </div>
          ` : `
            <div class="cards-grid">
              ${paginated.map(a => {
                const notas = State.notas.filter(n => n.alunoId === a.id);
                const media = notas.length > 0 ? (notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length).toFixed(1) : '-';
                return `
                  <div class="person-card" onclick="viewAluno('${a.id}')">
                    <div class="person-card-header">
                      <div class="person-avatar" style="background:${a.cor}">${initials(a.nome)}</div>
                      <div class="person-info">
                        <h4>${a.nome}</h4>
                        <small>${a.apelido ? '"'+a.apelido+'" • ' : ''}${a.id}</small>
                      </div>
                    </div>
                    <div class="person-card-body">
                      <div class="person-card-row"><span>Categoria</span>${categoriaBadge(a.categoria)}</div>
                      <div class="person-card-row"><span>Plano</span>${planoBadge(a.plano)}</div>
                      <div class="person-card-row"><span>Média</span><span class="nota-display nota-${media!=='-'?notaClass(parseFloat(media),20):'nulo'}">${media}</span></div>
                      <div class="person-card-row"><span>Situação</span>${statusBadge(a.situacao)}</div>
                    </div>
                    <div class="person-card-footer">
                      <button class="btn btn-sm" style="flex:1" onclick="event.stopPropagation();openAlunoModal('${a.id}')"><i class="fas fa-pen"></i> Editar</button>
                      <button class="btn btn-sm danger" onclick="event.stopPropagation();deleteAluno('${a.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            ${renderPagination(filtered.length, alunosPage, totalPages, 'alunosPage')}
          `}
        `;
      }

      function sortIcon(field) {
        if (alunosSort.field !== field) return '<i class="fas fa-sort sort-icon"></i>';
        return `<i class="fas fa-sort-${alunosSort.dir === 'asc' ? 'up' : 'down'} sort-icon" style="opacity:1;color:var(--primary)"></i>`;
      }

      function renderPagination(total, page, totalPages, pageVar) {
        if (total === 0) return '';
        const start = (page - 1) * alunosPerPage + 1;
        const end = Math.min(page * alunosPerPage, total);
        let pages = '';
        const maxButtons = 5;
        let startPage = Math.max(1, page - 2);
        let endPage = Math.min(totalPages, startPage + maxButtons - 1);
        if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);
        for (let i = startPage; i <= endPage; i++) {
          pages += `<button class="${i===page?'active':''}" onclick="${pageVar}=${i};rerender()">${i}</button>`;
        }
        return `
          <div class="pagination">
            <div class="pagination-info">Mostrando ${start}-${end} de ${total}</div>
            <div class="pagination-controls">
              <button ${page===1?'disabled':''} onclick="${pageVar}=${page-1};rerender()"><i class="fas fa-chevron-left"></i></button>
              ${pages}
              <button ${page===totalPages?'disabled':''} onclick="${pageVar}=${page+1};rerender()"><i class="fas fa-chevron-right"></i></button>
            </div>
          </div>
        `;
      }

      window.setAlunosView = function(v) { alunosView = v; rerender(); };
      window.sortAlunos = function(field) {
        if (alunosSort.field === field) alunosSort.dir = alunosSort.dir === 'asc' ? 'desc' : 'asc';
        else { alunosSort.field = field; alunosSort.dir = 'asc'; }
        rerender();
      };

      window.exportAlunos = function() {
        const data = getFilteredAlunos();
        if (data.length === 0) { showToast('warning', 'Vazio', 'Nenhum aluno para exportar'); return; }
        const csv = ['ID,Nome,Apelido,Categoria,Plano,Situação,Contato,Data Matrícula']
          .concat(data.map(a => `${a.id},"${a.nome}","${a.apelido||''}",${a.categoria},${a.plano},${a.situacao},"${a.contato||''}",${a.dataMatricula||''}`))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `alunos_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        showToast('success', 'Exportado', `${data.length} alunos exportados`);
      };

      window.importCSV = function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const text = ev.target.result;
              const lines = text.split('\n').filter(l => l.trim());
              if (lines.length < 2) { showToast('error', 'Erro', 'CSV vazio ou inválido'); return; }
              const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g,''));
              let imported = 0;
              const cores = ['#6366f1','#f59e0b','#10b981','#ec4899','#06b6d4','#8b5cf6'];
              for (let i = 1; i < lines.length; i++) {
                const values = lines[i].match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g) || [];
                const clean = values.map(v => v.replace(/^"|"$/g, '').trim());
                const obj = {};
                headers.forEach((h, idx) => obj[h] = clean[idx] || '');
                if (!obj.nome) continue;
                State.alunos.push({
                  id: nextId('A', State.alunos),
                  nome: obj.nome,
                  apelido: obj.apelido || '',
                  categoria: CATEGORIAS.includes(obj.categoria) ? obj.categoria : 'Jovem',
                  plano: PLANOS.includes(obj.plano) ? obj.plano : 'Intensivo',
                  dias: obj.plano === 'Extensivo' ? 2 : obj.plano === 'VIP' ? 7 : 5,
                  horarioInicio: '10:00',
                  horarioFim: obj.plano === 'Extensivo' ? '10:55' : '11:50',
                  plataforma: 'Google Meet',
                  contato: obj.contato || '',
                  dataMatricula: new Date().toISOString().split('T')[0],
                  situacao: 'Ativo',
                  metodoAula: 'Vídeo chamada',
                  observacao: '',
                  cor: cores[State.alunos.length % cores.length],
                  endereco: '',
                  responsavel: '',
                  nascimento: ''
                });
                imported++;
              }
              saveState();
              showToast('success', 'Importado', `${imported} alunos importados`);
              addLog('aluno', 'Importação CSV', `${imported} alunos importados`);
              rerender();
            } catch (err) {
              showToast('error', 'Erro', 'Falha ao importar CSV');
            }
          };
          reader.readAsText(file);
        };
        input.click();
      };

      window.viewAluno = function(id) {
        const a = State.alunos.find(x => x.id === id);
        if (!a) return;
        const presencasAluno = State.presencas.filter(p => p.alunoId === id);
        const pagamentosAluno = State.pagamentos.filter(p => p.alunoId === id);
        const notasAluno = State.notas.filter(n => n.alunoId === id);
        const presentes = presencasAluno.filter(p => p.status === 'Presente').length;
        const frequencia = presencasAluno.length > 0 ? Math.round(presentes/presencasAluno.length*100) : 0;
        const media = notasAluno.length > 0 ? (notasAluno.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notasAluno.length) : 0;
        const situacaoAcademica = notasAluno.length > 0 ? situacaoAluno(media) : '-';

        modalContainer.innerHTML = `
          <div class="modal-content">
            <div class="modal-header">
              <h3><i class="fas fa-user-graduate" style="color:var(--primary)"></i> Perfil do Aluno</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>

            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;padding:1.25rem;background:linear-gradient(135deg, ${a.cor}20, ${a.cor}05);border-radius:var(--radius-lg);border:1px solid ${a.cor}30">
              <div class="person-avatar" style="background:${a.cor};width:68px;height:68px;font-size:1.5rem">${initials(a.nome)}</div>
              <div style="flex:1">
                <strong style="font-size:1.25rem;display:block">${a.nome}</strong>
                <div style="color:var(--text-muted);font-size:0.85rem;margin:0.2rem 0">${a.apelido ? '"'+a.apelido+'" • ' : ''}${calcIdade(a.nascimento)}</div>
                <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.4rem">
                  <span class="info-chip"><i class="fas fa-hashtag"></i> ${a.id}</span>
                  ${statusBadge(a.situacao)}
                  ${planoBadge(a.plano)}
                  ${notasAluno.length > 0 ? statusBadge(situacaoAcademica) : ''}
                </div>
              </div>
              ${notasAluno.length > 0 ? `
                <div class="grade-circle" style="background:${media>=14?'var(--success)':media>=10?'var(--warning)':'var(--danger)'}">
                  <strong>${media.toFixed(1)}</strong>
                  <small>Média</small>
                </div>
              ` : ''}
            </div>

            <div class="sub-tabs">
              <button class="sub-tab active" onclick="switchSubTab(this,'tab-info')"><i class="fas fa-id-card"></i> Informações</button>
              <button class="sub-tab" onclick="switchSubTab(this,'tab-notas')"><i class="fas fa-star"></i> Notas (${notasAluno.length})</button>
              <button class="sub-tab" onclick="switchSubTab(this,'tab-presencas')"><i class="fas fa-clipboard-check"></i> Presenças (${presencasAluno.length})</button>
              <button class="sub-tab" onclick="switchSubTab(this,'tab-pagamentos')"><i class="fas fa-wallet"></i> Pagamentos (${pagamentosAluno.length})</button>
            </div>

            <div id="tab-info" class="sub-pane active">
              <div class="detail-grid">
                <div class="detail-item"><small><i class="fas fa-cake-candles"></i> Categoria</small><strong>${categoriaBadge(a.categoria)}</strong></div>
                <div class="detail-item"><small><i class="fas fa-birthday-cake"></i> Nascimento</small><strong>${formatDate(a.nascimento)}</strong></div>
                <div class="detail-item"><small><i class="fas fa-calendar-week"></i> Dias/Semana</small><strong>${a.dias} dias</strong></div>
                <div class="detail-item"><small><i class="fas fa-clock"></i> Horário</small><strong>${a.horarioInicio} - ${a.horarioFim}</strong></div>
                <div class="detail-item"><small><i class="fas fa-laptop"></i> Plataforma</small><strong>${a.plataforma}</strong></div>
                <div class="detail-item"><small><i class="fas fa-phone"></i> Contato</small><strong>${a.contato}</strong></div>
                <div class="detail-item"><small><i class="fas fa-location-dot"></i> Endereço</small><strong>${a.endereco || '-'}</strong></div>
                <div class="detail-item"><small><i class="fas fa-user-shield"></i> Responsável</small><strong>${a.responsavel || '-'}</strong></div>
                <div class="detail-item"><small><i class="fas fa-calendar-plus"></i> Matrícula</small><strong>${formatDate(a.dataMatricula)}</strong></div>
                <div class="detail-item"><small><i class="fas fa-video"></i> Método</small><strong>${metodoBadge(a.metodoAula)}</strong></div>
              </div>
              ${a.observacao ? `
                <div style="margin-top:1rem;padding:1rem;background:var(--surface-alt);border-radius:var(--radius);border-left:3px solid var(--primary)">
                  <small style="display:flex;align-items:center;gap:0.35rem;color:var(--text-muted);font-size:0.72rem;font-weight:600;text-transform:uppercase;margin-bottom:0.35rem"><i class="fas fa-note-sticky" style="color:var(--primary)"></i> Observação</small>
                  <div style="font-size:0.88rem">${escapeHtml(a.observacao)}</div>
                </div>
              ` : ''}
            </div>

                  <div class="form-group">
                    <label><i class="fas fa-hourglass"></i> Duração</label>

      window.updatePlanInfo = function() {
        const plano = document.getElementById('planoSelect')?.value;
        const diasInput = document.getElementById('diasInput');
        const duracaoInfo = document.getElementById('duracaoInfo');
        if (!plano) return;
        const map = { 'Extensivo': { dias: 2, duracao: '55 min' }, 'Intensivo': { dias: 5, duracao: '110 min' }, 'VIP': { dias: 7, duracao: 'Sob critério' } };
        const info = map[plano];
        if (diasInput) diasInput.max = info.dias;
        if (duracaoInfo) duracaoInfo.value = info.duracao;
      };

      window.saveAluno = function(id) {
        const form = document.getElementById('formAluno');
        const data = Object.fromEntries(new FormData(form).entries());
        data.dias = parseInt(data.dias);
        const cores = ['#6366f1','#f59e0b','#10b981','#ec4899','#06b6d4','#8b5cf6'];
        if (id) {
          const idx = State.alunos.findIndex(a => a.id === id);
          State.alunos[idx] = { ...State.alunos[idx], ...data };
          showToast('success', 'Atualizado', `${data.nome} atualizado`);
          addLog('aluno', 'Aluno atualizado', data.nome);
        } else {
          data.id = nextId('A', State.alunos);
          data.cor = cores[State.alunos.length % cores.length];
          State.alunos.push(data);
          showToast('success', 'Cadastrado', `${data.nome} adicionado`);
          addLog('aluno', 'Novo aluno', data.nome);
        }
        saveState();
        closeModal();
        switchTab('alunos');
      };

      window.deleteAluno = function(id) {
        const a = State.alunos.find(x => x.id === id);
        if (!confirm(`Excluir ${a?.nome}? Todas as notas, presenças e pagamentos serão removidos.`)) return;
        State.alunos = State.alunos.filter(x => x.id !== id);
        State.notas = State.notas.filter(n => n.alunoId !== id);
        State.presencas = State.presencas.filter(p => p.alunoId !== id);
        State.pagamentos = State.pagamentos.filter(p => p.alunoId !== id);
        saveState();
        showToast('error', 'Excluído', `${a?.nome} removido`);
        addLog('aluno', 'Aluno excluído', a?.nome || '');
        rerender();
      };

      // ===== NOTAS (NOVO!) =====
      let notasFilter = { alunoId: '', cursoId: '', tipo: '' };
      let notasSort = { field: 'data', dir: 'desc' };

      function getFilteredNotas() {
        let list = [...State.notas];
        if (notasFilter.alunoId) list = list.filter(n => n.alunoId === notasFilter.alunoId);
        if (notasFilter.cursoId) list = list.filter(n => n.cursoId === notasFilter.cursoId);
        if (notasFilter.tipo) list = list.filter(n => n.tipo === notasFilter.tipo);
        list.sort((a,b) => {
          let va = a[notasSort.field], vb = b[notasSort.field];
          if (notasSort.field === 'notaPct') { va = a.nota/a.valorMax; vb = b.nota/b.valorMax; }
          if (notasSort.field === 'data') { va = new Date(va); vb = new Date(vb); }
          return notasSort.dir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });
        return list;
      }

        if (State.alunos.length === 0 || State.cursos.length === 0) {

        const aprovados = State.alunos.filter(a => {

          if (notas.length === 0) return false;
          const media = notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length;
          return media >= 14;
        }).length;
        const recuperacao = State.alunos.filter(a => {
          const notas = State.notas.filter(n => n.alunoId === a.id);

          const media = notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length;
          return media >= 10 && media < 14;
        }).length;
        const reprovados = State.alunos.filter(a => {
          const notas = State.notas.filter(n => n.alunoId === a.id);
          if (notas.length === 0) return false;
          const media = notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length;

        return `

              <div class="stat-info">

                <h3>${aprovados}</h3>
                <div class="trend up"><i class="fas fa-arrow-up"></i> média ≥ 14</div>
              </div>

      function sortIconNotas(field) {
        if (notasSort.field !== field) return '<i class="fas fa-sort sort-icon"></i>';

      }

      window.sortNotas = function(field) {
        if (notasSort.field === field) notasSort.dir = notasSort.dir === 'asc' ? 'desc' : 'asc';
        else { notasSort.field = field; notasSort.dir = field === 'data' ? 'desc' : 'asc'; }

      window.exportNotas = function() {
        if (State.notas.length === 0) { showToast('warning', 'Vazio', 'Nenhuma nota para exportar'); return; }
        const csv = ['Aluno,Curso,Tipo,Título,Nota,Valor Máximo,Data,Peso,Observações']
          .concat(State.notas.map(n => {
            const curso = State.cursos.find(c => c.id === n.cursoId);
            return `"${n.alunoNome}","${curso?.nome||''}","${n.tipo}","${n.titulo}",${n.nota},${n.valorMax},${n.data},${n.peso},"${n.observacao||''}"`;
          })).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `notas_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        showToast('success', 'Exportado', `${State.notas.length} notas exportadas`);
      };

      window.calcPreview = function() {
        const nota = parseFloat(document.querySelector('input[name="nota"]')?.value);
        const max = parseFloat(document.querySelector('input[name="valorMax"]')?.value);
        const previewText = document.getElementById('previewText');
        const previewCircle = document.getElementById('previewCircle');
        if (!previewText || !previewCircle) return;
        if (isNaN(nota) || isNaN(max) || max === 0) {
          previewText.textContent = '-';
          previewCircle.innerHTML = '<strong style="font-size:1.1rem">-</strong>';
          previewCircle.style.background = 'var(--surface-alt)';
          previewCircle.style.color = 'var(--text)';
          return;
        }
        const pct20 = (nota/max) * 20;
        const pct = (nota/max) * 100;
        let status = '', cor = '';
        if (pct20 >= 14) { status = 'Aprovado'; cor = 'var(--success)'; }
        else if (pct20 >= 10) { status = 'Recuperação'; cor = 'var(--warning)'; }
        else { status = 'Reprovado'; cor = 'var(--danger)'; }
        previewText.innerHTML = `<span style="color:${cor}">${pct20.toFixed(1)}/20</span> • <span style="color:${cor}">${status}</span> • ${pct.toFixed(0)}%`;
        previewCircle.style.background = cor;
        previewCircle.style.color = 'white';
        previewCircle.innerHTML = `<strong style="font-size:1.1rem">${pct20.toFixed(1)}</strong>`;
      };

      window.saveNota = function(id) {
        const form = document.getElementById('formNota');
        const data = Object.fromEntries(new FormData(form).entries());
        data.nota = parseFloat(data.nota);
        data.valorMax = parseFloat(data.valorMax);
        data.peso = parseInt(data.peso);
        const aluno = State.alunos.find(a => a.id === data.alunoId);
        data.alunoNome = aluno?.nome || '';
        if (id) {
          const idx = State.notas.findIndex(n => n.id === id);
          State.notas[idx] = { ...State.notas[idx], ...data };
          showToast('success', 'Atualizado', 'Nota atualizada');
        } else {
          data.id = 'N' + Date.now();
          State.notas.push(data);
          showToast('success', 'Lançada', `Nota de ${data.nota}/${data.valorMax} registrada`);
          addLog('nota', 'Nota lançada', `${aluno?.nome} - ${data.titulo}`);
        }
        saveState();
        closeModal();
        switchTab('notas');
      };

      window.deleteNota = function(id) {
        if (!confirm('Excluir esta nota?')) return;
        State.notas = State.notas.filter(n => n.id !== id);
        saveState();
        showToast('error', 'Excluído', 'Nota removida');
        rerender();
      };
