      window.renderBoletim = function(alunoId) {
        const container = document.getElementById('boletimContent');
        if (!alunoId) { container.innerHTML = ''; return; }
        const aluno = State.alunos.find(a => a.id === alunoId);
        const notas = State.notas.filter(n => n.alunoId === alunoId);
        if (notas.length === 0) {
          container.innerHTML = `<div class="empty-state" style="padding:1.5rem"><small>Nenhuma nota para este aluno</small></div>`;
          return;
        }
        const porCurso = {};
        notas.forEach(n => {
          if (!porCurso[n.cursoId]) porCurso[n.cursoId] = [];
          porCurso[n.cursoId].push(n);
        });

        let html = `
          <div class="print-area" id="boletimPrint" style="margin-top:1rem">
            <div style="text-align:center;padding:1rem;background:var(--surface-alt);border-radius:var(--radius);margin-bottom:1rem">
              <h3 style="font-size:1.1rem">${aluno.nome}</h3>
              <small style="color:var(--text-muted)">${aluno.id} • ${categoriaBadge(aluno.categoria)} ${planoBadge(aluno.plano)}</small>
            </div>
        `;

        Object.keys(porCurso).forEach(cursoId => {
          const curso = State.cursos.find(c => c.id === cursoId);
          const notasCurso = porCurso[cursoId];
          const media = notasCurso.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notasCurso.length;
          html += `
            <div style="margin-bottom:1rem;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
              <div style="padding:0.75rem 1rem;background:${curso?.cor || '#6366f1'};color:white;display:flex;justify-content:space-between;align-items:center">
                <strong><i class="fas ${curso?.icone || 'fa-book'}"></i> ${curso?.nome || 'Curso'}</strong>
                <span style="font-size:1.1rem;font-weight:800">Média: ${media.toFixed(1)}/20</span>
              </div>
              <table style="min-width:auto">
                <thead><tr><th>Tipo</th><th>Título</th><th>Nota</th><th>Data</th></tr></thead>
                <tbody>
                  ${notasCurso.map(n => `
                    <tr>
                      <td>${tipoNotaBadge(n.tipo)}</td>
                      <td>${n.titulo}</td>
                      <td><span class="nota-display nota-${notaClass(n.nota, n.valorMax)}">${n.nota}/${n.valorMax}</span></td>
                      <td>${formatDate(n.data)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        });

        const mediaGeral = notas.reduce((s,n) => s + (n.nota/n.valorMax*20), 0) / notas.length;
        html += `
            <div style="padding:1rem;background:var(--surface-alt);border-radius:var(--radius);text-align:center">
              <small style="color:var(--text-muted);text-transform:uppercase;font-weight:600;font-size:0.75rem">Situação Final</small>
              <div style="font-size:1.5rem;font-weight:800;margin:0.3rem 0;color:${mediaGeral>=14?'var(--success)':mediaGeral>=10?'var(--warning)':'var(--danger)'}">
                ${mediaGeral.toFixed(1)}/20 - ${situacaoAluno(mediaGeral)}
              </div>
            </div>
          </div>
        `;
        container.innerHTML = html;
      };

      window.printBoletim = function() {

        w.document.write(`

        if (id) {
          const idx = State.professores.findIndex(p => p.id === id);
          State.professores[idx] = { ...State.professores[idx], ...data };
          showToast('success', 'Atualizado', 'Professor atualizado');
        } else {
          data.id = 'PR' + String(State.professores.length + 1).padStart(2,'0');
          data.cor = cores[State.professores.length % cores.length];
          State.professores.push(data);
          showToast('success', 'Adicionado', 'Professor cadastrado');
          addLog('professor', 'Novo professor', data.nome);

        saveState();
        closeModal();
        switchTab('professores');

        State.professores = State.professores.filter(x => x.id !== id);

        return `
          <div class="toolbar">
            <button class="btn btn-primary" onclick="openCursoModal()"><i class="fas fa-plus"></i> Novo Curso</button>
            <button class="btn" onclick="expandAllCourses()"><i class="fas fa-expand"></i> Expandir</button>
            <button class="btn" onclick="collapseAllCourses()"><i class="fas fa-compress"></i> Recolher</button>
          </div>
          ${State.cursos.map(c => {
            const prof = State.professores.find(p => p.id === c.professorId);
            const totalTopicos = c.niveis.reduce((s,n) => s + n.topicos.length, 0);
            const totalAssuntos = c.niveis.reduce((s,n) => s + n.topicos.reduce((st,t) => st + t.assuntos.length, 0), 0);
            return `
              <div class="course-card" id="course-${c.id}">
                <div class="course-header" onclick="toggleCourse('${c.id}')">
                  <div class="course-icon" style="background:${c.cor}"><i class="fas ${c.icone}"></i></div>
                  <div class="course-info">
                    <h3>${c.nome}</h3>
                    <small>${c.descricao}${prof ? ` • <i class="fas fa-user-tie"></i> ${prof.nome}` : ''}</small>
                    <div class="course-meta">
                      <span class="info-chip"><i class="fas fa-layer-group"></i> ${c.niveis.length} níveis</span>
                      <span class="info-chip"><i class="fas fa-list"></i> ${totalTopicos} tópicos</span>
                      <span class="info-chip"><i class="fas fa-bookmark"></i> ${totalAssuntos} assuntos</span>
                    </div>
                  </div>
                  <div class="course-toggle"><i class="fas fa-chevron-down"></i></div>
                </div>
                <div class="course-body">
                  <div class="course-body-inner">
                    ${c.niveis.map(n => renderLevel(c.id, n)).join('')}
                    <button class="add-btn-inline" onclick="openNivelModal('${c.id}')"><i class="fas fa-plus"></i> Adicionar Nível</button>
                    <div style="margin-top:0.75rem;display:flex;gap:0.5rem">
                      <button class="btn btn-sm" onclick="openCursoModal('${c.id}')"><i class="fas fa-pen"></i> Editar</button>
                      <button class="btn btn-sm" onclick="deleteCurso('${c.id}')" style="color:var(--danger)"><i class="fas fa-trash"></i> Excluir</button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        `;
      }

      function renderLevel(courseId, n) {
        return `
          <div class="level-item" id="level-${n.id}">
            <div class="level-header" onclick="toggleLevel('${n.id}')">
              <i class="fas fa-chevron-right chevron"></i>
              <i class="fas fa-layer-group" style="color:var(--primary)"></i>
              <strong>${n.nome}</strong>
              <span class="info-chip" style="margin-left:auto">${n.topicos.length} tópicos</span>
              <button class="btn btn-sm" onclick="event.stopPropagation();deleteNivel('${courseId}','${n.id}')" style="color:var(--danger);padding:0.2rem 0.5rem"><i class="fas fa-trash"></i></button>
            </div>
            <div class="level-content">
              ${n.topicos.map(t => `
                <div class="topic-item">
                  <div class="topic-header">
                    <span><i class="fas fa-list-check" style="color:var(--primary)"></i> ${t.nome}</span>
                    <div style="display:flex;gap:0.3rem">
                      <button class="add-btn-inline" onclick="openAssuntoModal('${courseId}','${n.id}','${t.id}')"><i class="fas fa-plus"></i> Assunto</button>
                      <button class="btn btn-sm" onclick="deleteTopico('${courseId}','${n.id}','${t.id}')" style="color:var(--danger);padding:0.2rem 0.5rem"><i class="fas fa-trash"></i></button>
                    </div>
                  </div>
                  <div class="subject-list">
                    ${t.assuntos.map((a,i) => `
                      <span class="subject-chip">
                        <i class="fas fa-bookmark"></i> ${a}
                        <i class="fas fa-xmark" style="cursor:pointer;color:var(--danger)" onclick="deleteAssunto('${courseId}','${n.id}','${t.id}',${i})"></i>
                      </span>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
              <button class="add-btn-inline" style="margin-left:1.5rem;margin-top:0.5rem" onclick="openTopicoModal('${courseId}','${n.id}')"><i class="fas fa-plus"></i> Adicionar Tópico</button>
            </div>
          </div>
        `;
      }

      window.toggleCourse = function(id) { document.getElementById('course-' + id).classList.toggle('expanded'); };
      window.toggleLevel = function(id) { document.getElementById('level-' + id).classList.toggle('expanded'); };
      window.expandAllCourses = function() { document.querySelectorAll('.course-card').forEach(c => c.classList.add('expanded')); };
      window.collapseAllCourses = function() { document.querySelectorAll('.course-card').forEach(c => c.classList.remove('expanded')); document.querySelectorAll('.level-item').forEach(l => l.classList.remove('expanded')); };

      window.openCursoModal = function(id) {
        const c = id ? State.cursos.find(x => x.id === id) : null;
        const icones = ['fa-square-root-variable','fa-atom','fa-language','fa-code','fa-flask','fa-calculator','fa-paint-brush','fa-music','fa-globe','fa-book','fa-laptop-code','fa-pen-ruler','fa-dna','fa-earth-africa'];
        const cores = ['#6366f1','#f59e0b','#10b981','#ec4899','#06b6d4','#8b5cf6'];
        modalContainer.innerHTML = `
          <div class="modal-content" style="max-width:500px">
            <div class="modal-header">
              <h3><i class="fas fa-book-open-reader" style="color:var(--primary)"></i> ${c ? 'Editar' : 'Novo'} Curso</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <form onsubmit="event.preventDefault();saveCurso('${id||''}')">
              <div class="form-group">
                <label><i class="fas fa-book"></i> Nome *</label>
                <input type="text" name="nome" value="${c?.nome || ''}" required>
              </div>
              <div class="form-group">
                <label><i class="fas fa-align-left"></i> Descrição</label>
                <input type="text" name="descricao" value="${c?.descricao || ''}">
              </div>
              <div class="form-group">
                <label><i class="fas fa-user-tie"></i> Professor Responsável</label>
                <select name="professorId">
                  <option value="">Nenhum</option>
                  ${State.professores.map(p => `<option value="${p.id}" ${c?.professorId===p.id?'selected':''}>${p.nome}</option>`).join('')}
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label><i class="fas fa-icons"></i> Ícone</label>
                  <select name="icone">
                    ${icones.map(i => `<option value="${i}" ${c?.icone===i?'selected':''}>${i.replace('fa-','')}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label><i class="fas fa-palette"></i> Cor</label>
                  <select name="cor">
                    ${cores.map(co => `<option value="${co}" ${c?.cor===co?'selected':''}>${co}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Salvar</button>
              </div>
            </form>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      window.saveCurso = function(id) {
        const form = document.querySelector('#modalContainer form');
        const data = Object.fromEntries(new FormData(form).entries());
        if (id) {
          const idx = State.cursos.findIndex(c => c.id === id);
          State.cursos[idx] = { ...State.cursos[idx], ...data };
          showToast('success', 'Atualizado', 'Curso atualizado');
        } else {
          data.id = 'C' + (State.cursos.length + 1);
          data.niveis = [];
          State.cursos.push(data);
          showToast('success', 'Criado', 'Novo curso adicionado');
          addLog('curso', 'Novo curso', data.nome);
        }
        saveState();
        closeModal();
        switchTab('cursos');
      };

      window.deleteCurso = function(id) {
        if (!confirm('Excluir este curso? Notas associadas serão mantidas.')) return;
        State.cursos = State.cursos.filter(c => c.id !== id);
        saveState();
        showToast('error', 'Excluído', 'Curso removido');
        switchTab('cursos');
      };

      window.openNivelModal = function(courseId) {
        modalContainer.innerHTML = `
          <div class="modal-content" style="max-width:450px">
            <div class="modal-header">
              <h3><i class="fas fa-layer-group" style="color:var(--primary)"></i> Novo Nível</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <form onsubmit="event.preventDefault();saveNivel('${courseId}')">
              <div class="form-group">
                <label><i class="fas fa-tag"></i> Nome *</label>
                <input type="text" name="nome" required>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Adicionar</button>
              </div>
            </form>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      window.saveNivel = function(courseId) {
        const nome = document.querySelector('#modalContainer input[name="nome"]').value;
        State.cursos.find(c => c.id === courseId).niveis.push({ id: 'N' + Date.now(), nome, topicos: [] });
        saveState(); closeModal(); switchTab('cursos');
        showToast('success', 'Adicionado', 'Nível criado');
      };

      window.deleteNivel = function(courseId, nivelId) {
        if (!confirm('Excluir este nível?')) return;
        State.cursos.find(c => c.id === courseId).niveis = State.cursos.find(c => c.id === courseId).niveis.filter(n => n.id !== nivelId);
        saveState(); switchTab('cursos');
      };

      window.openTopicoModal = function(courseId, nivelId) {
        modalContainer.innerHTML = `
          <div class="modal-content" style="max-width:450px">
            <div class="modal-header">
              <h3><i class="fas fa-list-check" style="color:var(--primary)"></i> Novo Tópico</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <form onsubmit="event.preventDefault();saveTopico('${courseId}','${nivelId}')">
              <div class="form-group">
                <label><i class="fas fa-tag"></i> Nome *</label>
                <input type="text" name="nome" required>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Adicionar</button>
              </div>
            </form>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      window.saveTopico = function(courseId, nivelId) {
        const nome = document.querySelector('#modalContainer input[name="nome"]').value;
        const nivel = State.cursos.find(c => c.id === courseId).niveis.find(n => n.id === nivelId);
        nivel.topicos.push({ id: 'T' + Date.now(), nome, assuntos: [] });
        saveState(); closeModal(); switchTab('cursos');
        showToast('success', 'Adicionado', 'Tópico criado');
      };

      window.deleteTopico = function(courseId, nivelId, topicoId) {
        if (!confirm('Excluir este tópico?')) return;
        const nivel = State.cursos.find(c => c.id === courseId).niveis.find(n => n.id === nivelId);
        nivel.topicos = nivel.topicos.filter(t => t.id !== topicoId);
        saveState(); switchTab('cursos');
      };

      window.openAssuntoModal = function(courseId, nivelId, topicoId) {
        modalContainer.innerHTML = `
          <div class="modal-content" style="max-width:450px">
            <div class="modal-header">
              <h3><i class="fas fa-bookmark" style="color:var(--primary)"></i> Novo Assunto</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <form onsubmit="event.preventDefault();saveAssunto('${courseId}','${nivelId}','${topicoId}')">
              <div class="form-group">
                <label><i class="fas fa-tag"></i> Nome *</label>
                <input type="text" name="nome" required>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Adicionar</button>
              </div>
            </form>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      window.saveAssunto = function(courseId, nivelId, topicoId) {
        const nome = document.querySelector('#modalContainer input[name="nome"]').value;
        const topico = State.cursos.find(c => c.id === courseId).niveis.find(n => n.id === nivelId).topicos.find(t => t.id === topicoId);
        topico.assuntos.push(nome);
        saveState(); closeModal(); switchTab('cursos');
        showToast('success', 'Adicionado', 'Assunto criado');
      };

      window.deleteAssunto = function(courseId, nivelId, topicoId, idx) {
        const topico = State.cursos.find(c => c.id === courseId).niveis.find(n => n.id === nivelId).topicos.find(t => t.id === topicoId);
        topico.assuntos.splice(idx, 1);
        saveState(); switchTab('cursos');
      };

      // ===== PRESENÇA =====
      let presencaFilter = { data: new Date().toISOString().split('T')[0], status: '' };

      function renderPresenca() {
        if (State.alunos.length === 0) {
          return `
            <div class="card">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-clipboard-check"></i></div>
                <h3>Cadastre alunos primeiro</h3>
                <p>Você precisa de alunos para registrar presenças.</p>
                <button class="btn btn-primary" onclick="switchTab('alunos');setTimeout(()=>openAlunoModal(),100)"><i class="fas fa-user-plus"></i> Cadastrar Aluno</button>
              </div>
            </div>
          `;
        }
        const presencasDia = State.presencas.filter(p => p.data === presencaFilter.data);
        const presentes = presencasDia.filter(p => p.status === 'Presente').length;
        const ausentes = presencasDia.filter(p => p.status === 'Ausente').length;
        const totalHoras = Math.round(presencasDia.reduce((s,p) => s + p.duracao, 0) / 60);

        let lista = presencasDia;
        if (presencaFilter.status) lista = lista.filter(p => p.status === presencaFilter.status);

        return `
          <div class="stats-grid">
            <div class="stat-card" style="--stat-color:#10b981">
              <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
              <div class="stat-info"><small>Presentes</small><h3>${presentes}</h3></div>
            </div>
            <div class="stat-card" style="--stat-color:#ef4444">
              <div class="stat-icon"><i class="fas fa-circle-xmark"></i></div>
              <div class="stat-info"><small>Ausentes</small><h3>${ausentes}</h3></div>
            </div>
            <div class="stat-card" style="--stat-color:#6366f1">
              <div class="stat-icon"><i class="fas fa-clock"></i></div>
              <div class="stat-info"><small>Total de Horas</small><h3>${totalHoras}h</h3></div>
            </div>
            <div class="stat-card" style="--stat-color:#f59e0b">
              <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
              <div class="stat-info"><small>Taxa de Presença</small><h3>${presencasDia.length > 0 ? Math.round(presentes/presencasDia.length*100) : 0}%</h3></div>
            </div>
          </div>

          <div class="toolbar">
            <button class="btn btn-primary" onclick="openPresencaModal()"><i class="fas fa-clipboard-check"></i> Registrar Aula</button>
            <button class="btn btn-success" onclick="bulkPresenca('Presente')"><i class="fas fa-check-double"></i> Todos Presentes</button>
            <input type="date" value="${presencaFilter.data}" onchange="presencaFilter.data=this.value;rerender()" style="max-width:180px">
            <div style="margin-left:auto;display:flex;gap:0.4rem">
              <span class="filter-chip ${presencaFilter.status===''?'active':''}" onclick="presencaFilter.status='';rerender()">Todas</span>
              <span class="filter-chip ${presencaFilter.status==='Presente'?'active':''}" onclick="presencaFilter.status='Presente';rerender()">Presentes</span>
              <span class="filter-chip ${presencaFilter.status==='Ausente'?'active':''}" onclick="presencaFilter.status='Ausente';rerender()">Ausentes</span>
            </div>
          </div>

          ${lista.length === 0 ? `
            <div class="card">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-calendar-xmark"></i></div>
                <h3>Nenhuma aula registrada</h3>
                <p>Não há registros para esta data.</p>
                <button class="btn btn-primary" onclick="openPresencaModal()"><i class="fas fa-plus"></i> Registrar Aula</button>
              </div>
            </div>
          ` : `
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th><i class="fas fa-user"></i> Aluno</th>
                    <th><i class="fas fa-book"></i> Curso</th>
                    <th><i class="fas fa-clock"></i> Horário</th>
                    <th><i class="fas fa-hourglass"></i> Duração</th>
                    <th><i class="fas fa-video"></i> Método</th>
                    <th><i class="fas fa-signal"></i> Status</th>
                    <th style="text-align:right">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  ${lista.map(p => {
                    const aluno = State.alunos.find(a => a.id === p.alunoId);
                    return `
                      <tr>
                        <td>
                          <div class="avatar-cell">
                            <div class="avatar-sm" style="background:${aluno?.cor || '#6366f1'}">${initials(p.alunoNome)}</div>
                            <strong>${p.alunoNome}</strong>
                          </div>
                        </td>
                        <td>${p.curso}</td>
                        <td><span class="info-chip"><i class="fas fa-clock"></i> ${p.hora}</span></td>
                        <td><span class="info-chip"><i class="fas fa-hourglass"></i> ${p.duracao}min</span></td>
                        <td>${metodoBadge(p.metodo)}</td>
                        <td>${statusBadge(p.status)}</td>
                        <td>
                          <div class="row-actions" style="justify-content:flex-end">
                            <button title="Editar" onclick="openPresencaModal('${p.id}')"><i class="fas fa-pen"></i></button>
                            <button title="Excluir" class="danger" onclick="deletePresenca('${p.id}')"><i class="fas fa-trash"></i></button>
                          </div>
                        </td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          `}
        `;
      }

      window.bulkPresenca = function(status) {
        const alunosAtivos = State.alunos.filter(a => a.situacao === 'Ativo');
        if (alunosAtivos.length === 0) { showToast('warning', 'Atenção', 'Nenhum aluno ativo'); return; }
        alunosAtivos.forEach(a => {
          const exists = State.presencas.find(p => p.alunoId === a.id && p.data === presencaFilter.data);
          if (!exists) {
            State.presencas.push({
              id: 'P' + Date.now() + Math.random(),
              alunoId: a.id,
              alunoNome: a.nome,
              curso: 'Geral',
              data: presencaFilter.data,
              hora: a.horarioInicio,
              duracao: a.plano === 'Extensivo' ? 55 : a.plano === 'Intensivo' ? 110 : 60,
              status: status,
              metodo: a.metodoAula
            });
          }
        });
        saveState();
        rerender();
        showToast('success', 'Chamada em massa', `${alunosAtivos.length} alunos marcados`);
        addLog('presenca', 'Chamada em massa', `${alunosAtivos.length} alunos - ${status}`);
      };

      window.openPresencaModal = function(id) {
        const p = id ? State.presencas.find(x => x.id === id) : null;
        modalContainer.innerHTML = `
          <div class="modal-content">
            <div class="modal-header">
              <h3><i class="fas fa-clipboard-check" style="color:var(--primary)"></i> ${p ? 'Editar' : 'Registrar'} Aula</h3>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <form id="formPresenca" onsubmit="event.preventDefault();savePresenca('${id||''}')">
              <div class="form-row">
                <div class="form-group">
                  <label><i class="fas fa-user-graduate"></i> Aluno *</label>
                  <select name="alunoId" required>
                    <option value="">Selecione...</option>
                    ${State.alunos.map(a => `<option value="${a.id}" ${p?.alunoId===a.id?'selected':''}>${a.nome} (${a.id})</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label><i class="fas fa-book"></i> Curso *</label>
                  <select name="curso" required>
                    <option value="">Selecione...</option>
                    ${State.cursos.map(c => `<option ${p?.curso===c.nome?'selected':''}>${c.nome}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="form-row-3">
                <div class="form-group">
                  <label><i class="fas fa-calendar"></i> Data *</label>
                  <input type="date" name="data" value="${p?.data || presencaFilter.data}" required>
                </div>
                <div class="form-group">
                  <label><i class="fas fa-clock"></i> Hora *</label>
                  <input type="time" name="hora" value="${p?.hora || '10:00'}" required>
                </div>
                <div class="form-group">
                  <label><i class="fas fa-hourglass"></i> Duração (min) *</label>
                  <input type="number" name="duracao" value="${p?.duracao || 60}" min="1" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label><i class="fas fa-video"></i> Método *</label>
                  <select name="metodo" required>
                    ${METODOS_AULA.map(m => `<option ${p?.metodo===m?'selected':''}>${m}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label><i class="fas fa-signal"></i> Status *</label>
                  <select name="status" required>
                    <option ${p?.status==='Presente'?'selected':''}>Presente</option>
                    <option ${p?.status==='Ausente'?'selected':''}>Ausente</option>
                    <option ${p?.status==='Justificado'?'selected':''}>Justificado</option>
                  </select>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Salvar</button>
              </div>
            </form>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      window.savePresenca = function(id) {
        const form = document.getElementById('formPresenca');
        const data = Object.fromEntries(new FormData(form).entries());
        data.duracao = parseInt(data.duracao);
        const aluno = State.alunos.find(a => a.id === data.alunoId);

      window.exportPagamentos = function() {

          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `pagamentos_${new Date().toISOString().split('T')[0]}.csv`;

        showToast('success', 'Exportado', `${State.pagamentos.length} pagamentos`);

          showToast('success', 'Registrado', 'Pagamento registrado');

      // ===== CALENDÁRIO =====
      let calDate = new Date();
      calDate.setDate(1);

      function renderCalendario() {
        const year = calDate.getFullYear();
        const month = calDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const today = new Date();
        const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

        let days = '';
        for (let i = firstDay - 1; i >= 0; i--) {
          days += `<div class="cal-day other-month">${daysInPrevMonth - i}</div>`;
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasEvent = State.presencas.some(p => p.data === dateStr) || State.pagamentos.some(p => p.vencimento === dateStr) || State.notas.some(n => n.data === dateStr);
          const isToday = isCurrentMonth && today.getDate() === d;
          days += `<div class="cal-day ${isToday?'today':''} ${hasEvent?'has-event':''}" onclick="showDayEvents('${dateStr}')">${d}</div>`;
        }
        const total = firstDay + daysInMonth;
        const remaining = (7 - (total % 7)) % 7;
        for (let i = 1; i <= remaining; i++) {
          days += `<div class="cal-day other-month">${i}</div>`;
        }

        const eventos = [];
        State.presencas.forEach(p => eventos.push({ tipo: 'Aula', data: p.data, titulo: `${p.alunoNome} - ${p.curso}`, cor: '#6366f1' }));
        State.notas.forEach(n => eventos.push({ tipo: 'Nota', data: n.data, titulo: `${n.alunoNome} - ${n.titulo}`, cor: '#8b5cf6' }));
        State.pagamentos.filter(p => p.status !== 'Pago').forEach(p => eventos.push({ tipo: 'Vencimento', data: p.vencimento, titulo: `${p.alunoNome} - ${formatMoeda(p.valor, p.moeda)}`, cor: '#ef4444' }));
        eventos.sort((a,b) => new Date(a.data) - new Date(b.data));

        return `
          <div class="dash-grid">
            <div class="card">
              <div class="card-header">
                <button class="btn btn-icon" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <div style="text-align:center">
                  <h3>${monthNames[month]} ${year}</h3>
                </div>
                <button class="btn btn-icon" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
              </div>
              <div class="mini-calendar">
                ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div class="cal-header">${d}</div>`).join('')}
                ${days}
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <div>
                  <h3><i class="fas fa-calendar-day" style="color:var(--primary)"></i> Próximos Eventos</h3>
                </div>
              </div>
              <div class="activity-list" style="max-height:400px;overflow-y:auto">
                ${eventos.length === 0 ? `<div class="empty-state" style="padding:2rem"><small>Sem eventos</small></div>` : eventos.slice(0,10).map(e => `
                  <div class="activity-item">
                    <div class="activity-icon" style="background:${e.cor}20;color:${e.cor}">
                      <i class="fas fa-${e.tipo==='Aula'?'book':e.tipo==='Nota'?'star':'money-bill'}"></i>
                    </div>
                    <div class="activity-info">
                      <strong>${e.titulo}</strong>
                      <small>${e.tipo} • ${formatDate(e.data)}</small>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }

      window.changeMonth = function(delta) {
        calDate.setMonth(calDate.getMonth() + delta);
        rerender();
      };

      window.showDayEvents = function(dateStr) {
        const presencas = State.presencas.filter(p => p.data === dateStr);

                    <div class="activity-icon" style="background:#8b5cf620;color:#8b5cf6"><i class="fas fa-star"></i></div>
                    <div class="activity-info">
                      <strong>${n.alunoNome}</strong>
                      <small>${n.titulo} • ${n.nota}/${n.valorMax}</small>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            ${pagamentos.length > 0 ? `
              <h4 style="font-size:0.9rem;margin-bottom:0.5rem"><i class="fas fa-money-bill"></i> Vencimentos (${pagamentos.length})</h4>
              <div class="activity-list">
                ${pagamentos.map(p => `
                  <div class="activity-item">
                    <div class="activity-icon" style="background:#ef444420;color:#ef4444"><i class="fas fa-money-bill"></i></div>
                    <div class="activity-info">
                      <strong>${p.alunoNome}</strong>
                      <small>${formatMoeda(p.valor, p.moeda)}</small>
                    </div>
                    ${statusBadge(p.status)}
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Fechar</button>
            </div>
          </div>
        `;
        modalContainer.classList.add('active');
      };

      // ===== CONFIG =====
      function renderConfig() {
        return `
          <div class="card">
            <div class="card-header">
              <div>
                <h3><i class="fas fa-database" style="color:var(--primary)"></i> Dados do Sistema</h3>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.85rem">
              <div class="detail-item"><small><i class="fas fa-user-graduate"></i> Alunos</small><strong>${State.alunos.length}</strong></div>
              <div class="detail-item"><small><i class="fas fa-chalkboard-user"></i> Professores</small><strong>${State.professores.length}</strong></div>
              <div class="detail-item"><small><i class="fas fa-book"></i> Cursos</small><strong>${State.cursos.length}</strong></div>
              <div class="detail-item"><small><i class="fas fa-star"></i> Notas</small><strong>${State.notas.length}</strong></div>
              <div class="detail-item"><small><i class="fas fa-clipboard-check"></i> Presenças</small><strong>${State.presencas.length}</strong></div>
              <div class="detail-item"><small><i class="fas fa-wallet"></i> Pagamentos</small><strong>${State.pagamentos.length}</strong></div>
            </div>
            <div style="margin-top:1.25rem;display:flex;gap:0.6rem;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="exportAllData()"><i class="fas fa-download"></i> Exportar Backup</button>
              <button class="btn" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> Importar Dados</button>
              <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAllData(event)">
              <button class="btn btn-danger" onclick="resetData()"><i class="fas fa-rotate-left"></i> Restaurar Padrão</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div>
                <h3><i class="fas fa-keyboard" style="color:var(--accent)"></i> Atalhos de Teclado</h3>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0.6rem">
              <div style="display:flex;justify-content:space-between;padding:0.5rem;background:var(--surface-alt);border-radius:var(--radius)"><span>Busca rápida</span><kbd style="background:var(--surface);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid var(--border);font-size:0.75rem">Ctrl+K</kbd></div>
              <div style="display:flex;justify-content:space-between;padding:0.5rem;background:var(--surface-alt);border-radius:var(--radius)"><span>Novo aluno</span><kbd style="background:var(--surface);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid var(--border);font-size:0.75rem">Ctrl+N</kbd></div>
              <div style="display:flex;justify-content:space-between;padding:0.5rem;background:var(--surface-alt);border-radius:var(--radius)"><span>Nova nota</span><kbd style="background:var(--surface);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid var(--border);font-size:0.75rem">Ctrl+L</kbd></div>
              <div style="display:flex;justify-content:space-between;padding:0.5rem;background:var(--surface-alt);border-radius:var(--radius)"><span>Fechar modal</span><kbd style="background:var(--surface);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid var(--border);font-size:0.75rem">Esc</kbd></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div>
                <h3><i class="fas fa-circle-info" style="color:var(--info)"></i> Sobre</h3>
              </div>
            </div>
            <div class="detail-grid">
              <div class="detail-item"><small><i class="fas fa-tag"></i> Versão</small><strong>3.0.0</strong></div>
              <div class="detail-item"><small><i class="fas fa-code"></i> Sistema</small><strong>Ja Ta Ki</strong></div>
              <div class="detail-item"><small><i class="fas fa-calendar"></i> Atualizado</small><strong>${new Date().toLocaleDateString('pt-BR')}</strong></div>
            </div>
          </div>
        `;
      }

      window.exportAllData = function() {
        const blob = new Blob([JSON.stringify(State, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `jataki_backup_${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        showToast('success', 'Exportado', 'Backup completo gerado');
      };

      window.importAllData = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            State = data;
            if (!State.notas) State.notas = [];
            if (!State.logs) State.logs = [];
            saveState();
            showToast('success', 'Importado', 'Dados restaurados');
            switchTab('dashboard');
          } catch (err) {
            showToast('error', 'Erro', 'Arquivo inválido');
          }
        };
        reader.readAsText(file);
      };

      window.resetData = function() {
        if (!confirm('Restaurar todos os dados? Isso apagará TUDO.')) return;
        if (!confirm('Tem certeza? Esta ação não pode ser desfeita!')) return;
        State = JSON.parse(JSON.stringify(emptyState));
        saveState();
        showToast('success', 'Restaurado', 'Dados padrão restaurados');
        switchTab('dashboard');
      };

      // ===== COMMAND PALETTE =====
      const commandPalette = document.getElementById('commandPalette');
      const commandInput = document.getElementById('commandInput');
      const commandResults = document.getElementById('commandResults');
      let commandSelectedIdx = 0;

      function openCommandPalette() {
        commandPalette.classList.add('active');
        commandInput.value = '';
        commandInput.focus();
        renderCommandResults('');
      }

      function closeCommandPalette() {
        commandPalette.classList.remove('active');
      }

      function renderCommandResults(query) {
        const q = query.toLowerCase().trim();
        let html = '';

        // Ações rápidas
        const actions = [
          { icon: 'fa-user-plus', label: 'Novo Aluno', desc: 'Cadastrar aluno', action: 'openAlunoModal()' },
          { icon: 'fa-chalkboard-user', label: 'Novo Professor', desc: 'Cadastrar professor', action: 'openProfessorModal()' },
          { icon: 'fa-book-open-reader', label: 'Novo Curso', desc: 'Criar curso', action: 'openCursoModal()' },
          { icon: 'fa-star', label: 'Lançar Nota', desc: 'Nova avaliação', action: 'openNotaModal()' },
          { icon: 'fa-clipboard-check', label: 'Registrar Aula', desc: 'Chamada', action: 'openPresencaModal()' },
          { icon: 'fa-money-bill-wave', label: 'Novo Pagamento', desc: 'Receber mensalidade', action: 'openPagamentoModal()' },
          { icon: 'fa-file-csv', label: 'Importar CSV', desc: 'Alunos em massa', action: 'importCSV()' }
        ];

        const filteredActions = actions.filter(a => !q || a.label.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));

        if (filteredActions.length > 0) {
          html += `<div class="command-section">Ações</div>`;
          filteredActions.forEach((a, i) => {
            html += `<div class="command-result ${i===commandSelectedIdx?'selected':''}" onclick="${a.action};closeCommandPalette()">
              <i class="fas ${a.icon}"></i>
              <strong>${a.label}</strong>
              <small>${a.desc}</small>
            </div>`;
          });
        }

        // Alunos
        const alunos = State.alunos.filter(a => !q || a.nome.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)).slice(0, 5);
        if (alunos.length > 0) {
          html += `<div class="command-section">Alunos</div>`;
          alunos.forEach(a => {
            html += `<div class="command-result" onclick="closeCommandPalette();switchTab('alunos');setTimeout(()=>viewAluno('${a.id}'),100)">
              <i class="fas fa-user-graduate" style="color:${a.cor}"></i>
              <strong>${a.nome}</strong>
              <small>${a.id}</small>
            </div>`;
          });
        }

        // Cursos
        const cursos = State.cursos.filter(c => !q || c.nome.toLowerCase().includes(q)).slice(0, 5);
        if (cursos.length > 0) {
          html += `<div class="command-section">Cursos</div>`;
          cursos.forEach(c => {
            html += `<div class="command-result" onclick="closeCommandPalette();switchTab('cursos');setTimeout(()=>toggleCourse('${c.id}'),100)">
              <i class="fas ${c.icone}" style="color:${c.cor}"></i>
              <strong>${c.nome}</strong>
              <small>${c.niveis.length} níveis</small>
            </div>`;
          });
        }

        // Navegação
        const tabs = [
          { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard' },
          { id: 'alunos', icon: 'fa-user-graduate', label: 'Alunos' },
          { id: 'professores', icon: 'fa-chalkboard-user', label: 'Professores' },
          { id: 'cursos', icon: 'fa-book-open-reader', label: 'Cursos' },
          { id: 'notas', icon: 'fa-clipboard-list', label: 'Notas' },
          { id: 'presenca', icon: 'fa-clipboard-check', label: 'Presença' },
          { id: 'pagamentos', icon: 'fa-wallet', label: 'Pagamentos' },
          { id: 'relatorios', icon: 'fa-chart-pie', label: 'Relatórios' },
          { id: 'calendario', icon: 'fa-calendar-days', label: 'Calendário' },
          { id: 'config', icon: 'fa-gear', label: 'Configurações' }
        ];
        const filteredTabs = tabs.filter(t => !q || t.label.toLowerCase().includes(q));
        if (filteredTabs.length > 0) {
          html += `<div class="command-section">Navegação</div>`;
          filteredTabs.forEach(t => {
            html += `<div class="command-result" onclick="closeCommandPalette();switchTab('${t.id}')">
              <i class="fas ${t.icon}"></i>
              <strong>${t.label}</strong>
              <small>Ir para</small>
            </div>`;
          });
        }

        if (!html) {
          html = `<div class="empty-state" style="padding:2rem"><small>Nenhum resultado</small></div>`;
        }

        commandResults.innerHTML = html;
      }

      commandInput.addEventListener('input', (e) => {
        commandSelectedIdx = 0;
        renderCommandResults(e.target.value);
      });

      commandInput.addEventListener('keydown', (e) => {
        const items = commandResults.querySelectorAll('.command-result');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          commandSelectedIdx = Math.min(commandSelectedIdx + 1, items.length - 1);
          items.forEach((it, i) => it.classList.toggle('selected', i === commandSelectedIdx));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          commandSelectedIdx = Math.max(commandSelectedIdx - 1, 0);
          items.forEach((it, i) => it.classList.toggle('selected', i === commandSelectedIdx));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          items[commandSelectedIdx]?.click();
        } else if (e.key === 'Escape') {
          closeCommandPalette();
        }
      });

      commandPalette.addEventListener('click', (e) => {
        if (e.target === commandPalette) closeCommandPalette();
      });

      // ===== ATALHOS DE TECLADO =====
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          openCommandPalette();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
          e.preventDefault();
          openAlunoModal();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
          e.preventDefault();
          openNotaModal();
        } else if (e.key === 'Escape') {
          if (commandPalette.classList.contains('active')) closeCommandPalette();
          else if (modalContainer.classList.contains('active')) closeModal();
        }
      });

      document.getElementById('globalSearch').addEventListener('click', () => {
        openCommandPalette();
      });

      // ===== NAVEGAÇÃO =====
      let currentTab = 'dashboard';
      function rerender() { switchTab(currentTab, true); }

      window.switchTab = function(tabId, keep) {
        currentTab = tabId;
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active');
        const [title, subtitle] = pageTitles[tabId] || ['Página', ''];
        document.getElementById('pageTitle').textContent = title;
        document.getElementById('pageSubtitle').textContent = subtitle;

        let html = '';
        if (tabId === 'dashboard') html = renderDashboard();
        else if (tabId === 'alunos') html = renderAlunos();
        else if (tabId === 'professores') html = renderProfessores();
        else if (tabId === 'cursos') html = renderCursos();
        else if (tabId === 'notas') html = renderNotas();
        else if (tabId === 'presenca') html = renderPresenca();
        else if (tabId === 'pagamentos') html = renderPagamentos();
        else if (tabId === 'relatorios') html = renderRelatorios();
        else if (tabId === 'calendario') html = renderCalendario();
        else if (tabId === 'config') html = renderConfig();
        content.innerHTML = html;
        document.getElementById('badgeAlunos').textContent = State.alunos.length;
        document.getElementById('badgeNotas').textContent = State.notas.length;
        if (!keep) window.scrollTo(0, 0);
      };

      window.closeModal = function() { modalContainer.classList.remove('active'); };

      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          switchTab(item.dataset.tab);
          document.getElementById('sidebar').classList.remove('open');
        });
      });

      document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const icon = document.querySelector('#themeToggle i');
        icon.className = document.body.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('jataki_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      });

      document.getElementById('mobileToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });

      modalContainer.addEventListener('click', (e) => {
        if (e.target === modalContainer) closeModal();
      });

      switchTab('dashboard');
    })();
  </script>
</body>
</html>
